<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Tech Soluções Tecnológicas</title>
    
    <style>
        body {
            background-color: #f9f9f9; /* Cinza claro no fundo */
            font-family: sans-serif;   /* Letra moderna e limpa */
            text-align: center;        /* Centraliza os elementos na tela */
            padding: 50px 20px;
        }
        h1 {
            color: #0f2d59; /* Azul escuro da sua logo */
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            color: #0f2d59; /* Azul escuro no texto explicativo */
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        a {
            background-color: #e8731b; /* Laranja vibrante da sua logo */
            color: #ffffff;            /* Texto do botão em branco */
            padding: 15px 30px;        /* Espaçamento interno do botão */
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;     /* Remove o sublinhado de link */
            display: inline-block;     
            border-radius: 5px;        /* Arredonda os cantos do botão */
            transition: background 0.3s;
        }
        a:hover {
            background-color: #cf6215; /* Escurece o laranja quando passa o mouse */
        }
    </style>
</head>
<body>

    <h1>Multi Tech Soluções Tecnológicas</h1>
    <p>Soluções rápidas e definitivas em manutenção predial e climatização comercial.</p>

    <a href="https://wa.me/5549988469995">Solicitar Orçamento Grátis</a>

    <script>
        // Seleciona o botão de link <a>
        const botao = document.querySelector('a');

        // Escuta o clique do cliente
        botao.addEventListener('click', function(event) {
            // Exibe a mensagem na tela antes de seguir para o link
            alert('Obrigado pelo contato! A Multi Tech responderá em breve.');
        });
    </script>

</body>
</html>
